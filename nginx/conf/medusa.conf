server {
    listen 80;
    server_name api.elanorraliving.in;

    # Certbot acme challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.elanorraliving.in;

    ssl_certificate /etc/letsencrypt/live/api.elanorraliving.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.elanorraliving.in/privkey.pem;

    # Performance and security headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://medusa-api:9000;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_redirect off;
    }
}
